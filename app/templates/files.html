{% extends "base.html" %}

{% block page_body %}
<section class="panel-surface files-toolbar-card">
    <div class="files-toolbar-top">
        <div class="breadcrumbs" id="breadcrumbs"></div>
        <label class="search-field search-field-files">
            <span class="visually-hidden">Dateien durchsuchen</span>
            <input id="fileSearchInput" type="search" placeholder="Suche im aktuellen Pfad">
        </label>
        <div class="toolbar-actions compact-actions">
            <button class="danger-button" id="bulkDeleteBtn" type="button" disabled>Löschen</button>
            <button class="secondary-button" id="bulkMoveBtn" type="button" disabled>Verschieben</button>
            <button class="secondary-button" id="bulkCopyBtn" type="button" disabled>Kopieren</button>
            <button class="secondary-button" id="bulkDownloadBtn" type="button" disabled>ZIP</button>
        </div>
    </div>
    <div class="files-toolbar-bottom">
        <div class="toolbar-actions compact-actions">
            <button class="secondary-button" id="navigateUpBtn" type="button">Ebene hoch</button>
            <button class="secondary-button" id="refreshFilesBtn" type="button">Neu laden</button>
            <button class="secondary-button" id="newFolderBtn" type="button">Ordner</button>
            <button class="secondary-button" id="newFileBtn" type="button">Datei</button>
            <button class="primary-button" id="uploadFilesBtn" type="button">Upload</button>
            <button class="primary-button" id="uploadArchiveBtn" type="button">ZIP-Upload</button>
        </div>
        <div class="dropzone compact-dropzone" id="dropzone">
            <strong>Drag and drop</strong>
            <span>Dateien oder ZIPs direkt in den Workspace ziehen</span>
        </div>
    </div>
</section>

<section class="files-layout">
    <article class="panel-surface file-browser-card">
        <div class="panel-header">
            <div>
                <p class="eyebrow">Dateimanager</p>
                <h3>Projektdateien</h3>
            </div>
        </div>
        <div class="table-shell">
            <table class="file-table">
                <thead>
                    <tr>
                        <th><input id="selectAllCheckbox" type="checkbox" aria-label="Alle Einträge auswählen"></th>
                        <th>Name</th>
                        <th>Typ</th>
                        <th>Größe</th>
                        <th>Geändert</th>
                        <th>Aktionen</th>
                    </tr>
                </thead>
                <tbody id="fileTableBody"></tbody>
            </table>
        </div>
    </article>

    <article class="panel-surface editor-panel editor-panel-tight">
        <div class="panel-header between">
            <div>
                <p class="eyebrow">Editor</p>
                <h3 id="editorTitle">Keine Datei geöffnet</h3>
            </div>
            <div class="toolbar-actions compact-actions">
                <span class="meta-pill" id="editorLanguage">Text</span>
                <span class="meta-pill" id="editorDirtyBadge" data-dirty="false">Gespeichert</span>
                <button class="secondary-button" id="reloadFileBtn" type="button" disabled>Neu laden</button>
                <button class="primary-button" id="saveFileBtn" type="button" disabled>Speichern</button>
            </div>
        </div>
        <textarea id="editorTextarea" class="editor-textarea" spellcheck="false" placeholder="Datei aus der Liste wählen, um sie hier zu bearbeiten."></textarea>
        <p class="panel-footnote" id="editorMeta">Noch keine Datei geladen.</p>
    </article>
</section>

<input id="uploadFilesInput" type="file" multiple hidden>
<input id="uploadArchiveInput" type="file" accept=".zip" multiple hidden>
{% endblock %}
