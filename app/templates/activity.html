{% extends "base.html" %}

{% block page_body %}
<section class="split-main activity-layout">
    <article class="surface">
        <div class="surface-header toolbar-spread">
            <div>
                <p class="section-label">{{ ui["nav.activity"] }}</p>
                <h1>{{ ui["activity.logs"] }}</h1>
            </div>
            <div class="toolbar-actions">
                <button class="btn btn-secondary is-active" data-log-tab="bot" type="button">{{ ui["activity.bot_logs"] }}</button>
                <button class="btn btn-secondary" data-log-tab="system" type="button">{{ ui["activity.system_logs"] }}</button>
                <a class="btn btn-secondary" id="downloadLogsLink" href="/api/logs/bot/download">{{ ui["activity.download"] }}</a>
            </div>
        </div>
        <pre class="terminal-output activity-terminal" id="logOutput">{{ ui["activity.waiting"] }}</pre>
    </article>

    <article class="surface side-surface">
        <div class="surface-header">
            <div>
                <p class="section-label">{{ ui["activity.heading"] }}</p>
                <h2>{{ ui["activity.history"] }}</h2>
            </div>
        </div>
        <div class="list-stack" id="historyList"></div>
    </article>
</section>
{% endblock %}
