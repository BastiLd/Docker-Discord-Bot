{% extends "base.html" %}

{% block page_body %}
<section class="activity-layout">
    <article class="panel-surface log-card">
        <div class="panel-header between">
            <div>
                <p class="eyebrow">Live-Logs</p>
                <h3>Bot- und Systemprotokolle</h3>
            </div>
            <div class="toolbar-actions compact-actions">
                <button class="tab-button is-active" data-log-tab="bot" type="button">Bot-Logs</button>
                <button class="tab-button" data-log-tab="system" type="button">System-Logs</button>
                <a class="ghost-button" id="downloadLogsLink" href="/api/logs/bot/download">Download</a>
            </div>
        </div>
        <pre class="terminal-preview activity-terminal" id="logOutput">Warte auf Log-Ausgabe ...</pre>
    </article>

    <article class="panel-surface history-card">
        <div class="panel-header">
            <div>
                <p class="eyebrow">Verlauf</p>
                <h3>Prozessereignisse</h3>
            </div>
        </div>
        <div class="history-list history-list-side" id="historyList"></div>
    </article>
</section>
{% endblock %}
