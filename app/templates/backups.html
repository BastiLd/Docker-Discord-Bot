{% extends "base.html" %}

{% block page_body %}
<section class="surface">
    <div class="surface-header toolbar-spread">
        <div>
            <p class="section-label">{{ ui["nav.backups"] }}</p>
            <h1>{{ ui["backups.heading"] }}</h1>
        </div>
        <button class="btn btn-primary" id="createBackupBtn" type="button">{{ ui["backups.create"] }}</button>
    </div>
    <div class="table-wrap">
        <table class="data-table">
            <thead>
                <tr>
                    <th>{{ ui["backups.name"] }}</th>
                    <th>{{ ui["files.size"] }}</th>
                    <th>{{ ui["backups.created"] }}</th>
                    <th>{{ ui["backups.checksum"] }}</th>
                    <th>{{ ui["backups.actions"] }}</th>
                </tr>
            </thead>
            <tbody id="backupTableBody"></tbody>
        </table>
    </div>
</section>
{% endblock %}
